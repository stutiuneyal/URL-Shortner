services:
  mongo:
    image: mongo:6.0
    container_name: urlshortner-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=urlshortner
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urlshortner-net

  redis:
    image: redis:7.2
    container_name: urlshortner-redis
    restart: unless-stopped
    command: ["redis-server", "--port", "6380", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6380:6380"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - urlshortner-net


## TODO: Add Backend

volumes:
  mongo_data:
  redis_data:

networks:
  urlshortner-net:
    driver: bridge